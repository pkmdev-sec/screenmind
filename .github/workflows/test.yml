name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Show Swift Version
        run: swift --version

      - name: Build
        run: swift build

      - name: Run Tests
        run: swift test

      - name: Build CLI
        run: swift build --product screenmind-cli
