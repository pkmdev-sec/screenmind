name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.10'

      - name: Build
        run: swift build

      - name: Run Tests
        run: swift test

      - name: Build CLI
        run: swift build --product screenmind-cli
