<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3CE1"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Mini icon -->
  <rect x="20" y="20" width="160" height="160" rx="36" fill="url(#iconBg)"/>

  <!-- Mini screen -->
  <rect x="48" y="44" width="104" height="72" rx="8" fill="#E0E7FF" opacity="0.95"/>
  <rect x="54" y="50" width="92" height="60" rx="4" fill="#1E1B4B" opacity="0.9"/>

  <!-- Mini stand -->
  <rect x="88" y="116" width="24" height="10" rx="2" fill="#C7D2FE" opacity="0.7"/>
  <rect x="78" y="124" width="44" height="4" rx="2" fill="#C7D2FE" opacity="0.6"/>

  <!-- Mini brain -->
  <g transform="translate(100, 78)">
    <path d="M-3,-22 C-16,-22 -26,-14 -28,-2 C-30,6 -24,12 -18,16 C-22,18 -24,22 -20,26 C-16,30 -10,30 -6,26 L-2,28 L-2,-22 Z"
          fill="white" opacity="0.9"/>
    <path d="M2,-22 C15,-22 25,-14 27,-2 C29,6 23,12 17,16 C21,18 23,22 19,26 C15,30 9,30 5,26 L1,28 L1,-22 Z"
          fill="white" opacity="0.85"/>
    <path d="M-22,-8 C-14,-10 -8,-6 -4,-8" stroke="#8B5CF6" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M21,-8 C13,-10 7,-6 3,-8" stroke="#8B5CF6" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Sparkles -->
  <circle cx="44" cy="58" r="2" fill="#A78BFA" opacity="0.7">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="156" cy="64" r="1.5" fill="#C4B5FD" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Product name -->
  <text x="210" y="120" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="72" font-weight="700" fill="url(#textGrad)">ScreenMind</text>
  <text x="213" y="152" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="18" font-weight="400" fill="#94A3B8" letter-spacing="4">AI-POWERED SCREEN MEMORY</text>
</svg>
