<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3CE1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E0E7FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C7D2FE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E7FF;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4F46E5" flood-opacity="0.3"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset in="blur" dx="0" dy="0" result="offsetBlur"/>
      <feFlood flood-color="#A78BFA" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Subtle inner glow -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#glow)" opacity="0.5"/>

  <!-- Monitor/Screen frame -->
  <rect x="112" y="100" width="288" height="208" rx="16" ry="16" fill="url(#screen)" opacity="0.95"/>
  <!-- Screen inner (dark) -->
  <rect x="124" y="112" width="264" height="184" rx="8" ry="8" fill="#1E1B4B" opacity="0.9"/>

  <!-- Monitor stand -->
  <rect x="232" y="308" width="48" height="24" rx="4" fill="#C7D2FE" opacity="0.8"/>
  <rect x="208" y="328" width="96" height="8" rx="4" fill="#C7D2FE" opacity="0.7"/>

  <!-- Brain inside the screen - simplified elegant brain shape -->
  <g transform="translate(256, 200)" filter="url(#innerGlow)">
    <!-- Left hemisphere -->
    <path d="M-8,-52 C-38,-52 -62,-36 -66,-8 C-70,12 -58,28 -44,36 C-54,40 -58,52 -50,62 C-42,72 -26,72 -16,64 C-12,68 -8,70 -4,70 L-4,-52 Z"
          fill="url(#brain)" opacity="0.95"/>
    <!-- Right hemisphere -->
    <path d="M4,-52 C34,-52 58,-36 62,-8 C66,12 54,28 40,36 C50,40 54,52 46,62 C38,72 22,72 12,64 C8,68 4,70 0,70 L0,-52 Z"
          fill="url(#brain)" opacity="0.9"/>

    <!-- Brain folds/sulci - left -->
    <path d="M-50,-20 C-36,-24 -22,-16 -10,-20" stroke="#8B5CF6" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M-54,4 C-38,0 -24,8 -8,4" stroke="#8B5CF6" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M-46,26 C-34,22 -22,28 -10,24" stroke="#8B5CF6" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>

    <!-- Brain folds/sulci - right -->
    <path d="M46,-20 C32,-24 18,-16 6,-20" stroke="#8B5CF6" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M50,4 C34,0 20,8 4,4" stroke="#8B5CF6" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M42,26 C30,22 18,28 6,24" stroke="#8B5CF6" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>

    <!-- Neural connection dots -->
    <circle cx="-30" cy="-36" r="3" fill="#A78BFA" opacity="0.8"/>
    <circle cx="26" cy="-36" r="3" fill="#A78BFA" opacity="0.8"/>
    <circle cx="-40" cy="10" r="2.5" fill="#A78BFA" opacity="0.7"/>
    <circle cx="36" cy="10" r="2.5" fill="#A78BFA" opacity="0.7"/>
    <circle cx="-24" cy="48" r="2" fill="#A78BFA" opacity="0.6"/>
    <circle cx="20" cy="48" r="2" fill="#A78BFA" opacity="0.6"/>
  </g>

  <!-- Floating AI sparkle dots around screen -->
  <circle cx="100" cy="140" r="4" fill="#A78BFA" opacity="0.8">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="412" cy="160" r="3" fill="#C4B5FD" opacity="0.7">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="120" r="2.5" fill="#DDD6FE" opacity="0.6">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="130" cy="280" r="3" fill="#C4B5FD" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Text: ScreenMind below monitor -->
  <text x="256" y="398" font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="42" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">ScreenMind</text>
  <text x="256" y="432" font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="16" font-weight="400" fill="#C4B5FD" text-anchor="middle" letter-spacing="3" text-transform="uppercase">SCREEN MEMORY</text>
</svg>
