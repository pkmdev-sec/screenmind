<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .header .logo {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .status {
      font-size: 12px;
      color: #888;
      margin-bottom: 12px;
    }
    .status.connected { color: #4ade80; }
    .status.disconnected { color: #f87171; }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 8px;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button.primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    button.secondary {
      background: rgba(255,255,255,0.1);
      color: #ccc;
    }
    .result {
      font-size: 11px;
      color: #888;
      margin-top: 8px;
      text-align: center;
    }
    .result.success { color: #4ade80; }
    .result.error { color: #f87171; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🧠</div>
    <h1>ScreenMind</h1>
  </div>
  <div id="status" class="status">Checking connection...</div>
  <button id="captureBtn" class="primary">Capture This Page</button>
  <button id="captureSelectionBtn" class="secondary">Capture Selection</button>
  <div id="result" class="result"></div>
  <script src="popup.js"></script>
</body>
</html>
